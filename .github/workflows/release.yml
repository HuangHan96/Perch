name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python setuptools for distutils
        run: |
          python3 -m pip install setuptools
          echo "PYTHON=$(which python3)" >> "$GITHUB_ENV"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Patch package.json version
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ steps.version.outputs.VERSION }}';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Patched version to ${{ steps.version.outputs.VERSION }}"
          head -5 package.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: |
          npx tsc
          npx tsc -p src/renderer/tsconfig.json
          mkdir -p dist/renderer dist/locales
          cp src/renderer/*.html src/renderer/*.css dist/renderer/
          cp src/locales/*.json dist/locales/

      - name: Build native module
        run: npx node-gyp rebuild

      - name: Package
        run: npx electron-builder --mac --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perch-macos-${{ matrix.arch }}
          path: |
            dist/Perch-*.dmg
            dist/Perch-*.zip
          if-no-files-found: error

  release:
    needs: build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Perch ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: artifacts/*
