<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Perch bird silhouette - minimalist and clean -->
  <defs>
    <linearGradient id="birdGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B45309;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Bird body -->
  <ellipse cx="60" cy="65" rx="22" ry="28" fill="url(#birdGradient)"/>

  <!-- Bird head -->
  <circle cx="60" cy="42" r="16" fill="url(#birdGradient)"/>

  <!-- Eye -->
  <circle cx="64" cy="40" r="3" fill="#1A1614"/>

  <!-- Beak -->
  <path d="M 72 42 L 82 40 L 72 38 Z" fill="#1A1614"/>

  <!-- Wing -->
  <path d="M 50 60 Q 35 65 32 75 Q 38 72 50 70 Z" fill="#B45309" opacity="0.8"/>

  <!-- Tail feathers -->
  <path d="M 45 85 Q 38 95 35 105" stroke="#B45309" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M 50 88 Q 45 98 43 108" stroke="#B45309" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M 55 90 Q 52 100 51 110" stroke="#B45309" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Legs -->
  <line x1="58" y1="90" x2="58" y2="100" stroke="#1A1614" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="66" y1="90" x2="66" y2="100" stroke="#1A1614" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Feet -->
  <path d="M 58 100 L 54 103 M 58 100 L 62 103" stroke="#1A1614" stroke-width="2" stroke-linecap="round"/>
  <path d="M 66 100 L 62 103 M 66 100 L 70 103" stroke="#1A1614" stroke-width="2" stroke-linecap="round"/>

  <!-- Perch branch -->
  <rect x="20" y="100" width="80" height="4" rx="2" fill="#6B5F54"/>
  <ellipse cx="30" cy="102" rx="3" ry="2" fill="#9B8E82"/>
  <ellipse cx="90" cy="102" rx="3" ry="2" fill="#9B8E82"/>
</svg>
