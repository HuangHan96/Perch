<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes tap {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(0.95); opacity: 0.7; }
      }
      @keyframes windowSlide {
        from { transform: translateY(40px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes contentFade {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .key-tap { animation: tap 0.4s ease-in-out; }
      .key-tap-2 { animation: tap 0.4s ease-in-out 0.5s; }
      .window { animation: windowSlide 0.6s ease-out 1.2s both; }
      .content { animation: contentFade 0.8s ease-out 1.8s both; }
    </style>

    <linearGradient id="windowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EDE7DB;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1A1614"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Georgia, serif" font-size="24" fill="#F5F0E8" text-anchor="middle" font-weight="600">Double-tap Option to Open Knowledge Base</text>

  <!-- Option key - first tap -->
  <g class="key-tap">
    <rect x="280" y="120" width="100" height="60" rx="8" fill="#FEFCF9" stroke="#D97706" stroke-width="3"/>
    <text x="330" y="158" font-family="Arial, sans-serif" font-size="18" fill="#1A1614" text-anchor="middle" font-weight="600">⌥</text>
  </g>

  <!-- Option key - second tap -->
  <g class="key-tap-2">
    <rect x="420" y="120" width="100" height="60" rx="8" fill="#FEFCF9" stroke="#D97706" stroke-width="3"/>
    <text x="470" y="158" font-family="Arial, sans-serif" font-size="18" fill="#1A1614" text-anchor="middle" font-weight="600">⌥</text>
  </g>

  <!-- Arrow -->
  <path d="M 400 200 L 400 240" stroke="#F5F0E8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M 400 240 L 390 230 M 400 240 L 410 230" stroke="#F5F0E8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Knowledge Base Window -->
  <g class="window">
    <!-- Window frame -->
    <rect x="150" y="270" width="500" height="300" rx="12" fill="url(#windowGradient)" stroke="#6B5F54" stroke-width="2"/>

    <!-- Window title bar -->
    <rect x="150" y="270" width="500" height="40" rx="12" fill="#EDE7DB"/>
    <rect x="150" y="298" width="500" height="12" fill="#EDE7DB"/>

    <!-- Window controls -->
    <circle cx="170" cy="290" r="6" fill="#DC2626"/>
    <circle cx="190" cy="290" r="6" fill="#F59E0B"/>
    <circle cx="210" cy="290" r="6" fill="#16A34A"/>

    <!-- Window title -->
    <text x="400" y="295" font-family="Georgia, serif" font-size="16" fill="#1A1614" text-anchor="middle" font-weight="600">Perch</text>

    <!-- Sidebar -->
    <rect x="150" y="310" width="120" height="260" fill="#EDE7DB"/>

    <!-- Nav items -->
    <g class="content">
      <rect x="160" y="325" width="100" height="30" rx="6" fill="#FEFCF9"/>
      <text x="210" y="347" font-family="Arial, sans-serif" font-size="13" fill="#1A1614" text-anchor="middle">Browse</text>

      <rect x="160" y="365" width="100" height="30" rx="6" fill="transparent"/>
      <text x="210" y="387" font-family="Arial, sans-serif" font-size="13" fill="#6B5F54" text-anchor="middle">Ask</text>

      <rect x="160" y="405" width="100" height="30" rx="6" fill="transparent"/>
      <text x="210" y="427" font-family="Arial, sans-serif" font-size="13" fill="#6B5F54" text-anchor="middle">Keywords</text>
    </g>

    <!-- Main content area -->
    <g class="content">
      <!-- Search box -->
      <rect x="290" y="325" width="340" height="35" rx="8" fill="#FFFEF9" stroke="#E5DDD0" stroke-width="1"/>
      <text x="310" y="350" font-family="Arial, sans-serif" font-size="13" fill="#9B8E82">Search entries...</text>

      <!-- Entry cards -->
      <rect x="290" y="375" width="340" height="60" rx="8" fill="#FEFCF9" stroke="#E5DDD0" stroke-width="1"/>
      <text x="310" y="398" font-family="Arial, sans-serif" font-size="14" fill="#1A1614" font-weight="500">Screen Analysis Demo</text>
      <text x="310" y="418" font-family="monospace" font-size="11" fill="#9B8E82">2024-01-15 · image</text>

      <rect x="290" y="445" width="340" height="60" rx="8" fill="#FEFCF9" stroke="#E5DDD0" stroke-width="1"/>
      <text x="310" y="468" font-family="Arial, sans-serif" font-size="14" fill="#1A1614" font-weight="500">OCR Technology Notes</text>
      <text x="310" y="488" font-family="monospace" font-size="11" fill="#9B8E82">2024-01-14 · text</text>

      <rect x="290" y="515" width="340" height="40" rx="8" fill="#FEFCF9" stroke="#E5DDD0" stroke-width="1"/>
      <text x="310" y="543" font-family="Arial, sans-serif" font-size="14" fill="#1A1614" font-weight="500">Research Paper.pdf</text>
    </g>
  </g>
</svg>
